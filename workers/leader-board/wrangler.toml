# Chunk: docs/chunks/leader_board_durable_objects - Cloudflare DO adapter
name = "leader-board"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[durable_objects.bindings]]
name = "SWARM_DO"
class_name = "SwarmDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SwarmDO"]

# Chunk: docs/chunks/invite_path_routing_fix - Token-to-swarm secondary index for invite routing
[[kv_namespaces]]
binding = "TOKEN_SWARM_INDEX"
id = "TOKEN_SWARM_INDEX"

[observability]
[observability.logs]
enabled = false
invocation_logs = true
