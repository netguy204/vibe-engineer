# Chunk: docs/chunks/leader_board_durable_objects - Cloudflare DO adapter
name = "leader-board"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[durable_objects.bindings]]
name = "SWARM_DO"
class_name = "SwarmDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SwarmDO"]

# Chunk: docs/chunks/invite_path_routing_fix - Token-to-swarm secondary index for invite routing
[[kv_namespaces]]
binding = "TOKEN_SWARM_INDEX"
id = "542efadc0c9247aab720b4844a218520"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
